version: 1
backend:
  phases:
    # 1. Move the installation to the correct phase
    install:
      commands:
        - npm ci --legacy-peer-deps
    build:
      commands:
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    # 2. Keep frontend clean and isolated
    install:
      commands:
        - npm ci --legacy-peer-deps
    build:
      commands:
        - npm run build 
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*