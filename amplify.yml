version: 1
backend:
  phases:
    build:
      commands:
        # Added --legacy-peer-deps flag here
        - npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        # And added --legacy-peer-deps flag here
        - npm install 
    build:
      commands:
        - npm run build 
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*